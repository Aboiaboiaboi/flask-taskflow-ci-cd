version: '3.9'

services:
  db:
    image: busybox:latest
    container_name: flask-taskflow-db
    volumes:
      - taskflow-db:/data
    command: sleep infinity
    networks:
      - taskflow-network

  flask-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flask-taskflow-dev
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/__pycache__
      - taskflow-db:/app/data
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    command: flask run --host=0.0.0.0
    stdin_open: true
    tty: true
    depends_on:
      - db
    networks:
      - taskflow-network

volumes:
  taskflow-db:
    driver: local

networks:
  taskflow-network:
    driver: bridge
